services:
  - type: web
    name: one-smart-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: DEFAULT_PASSCODE
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY_PEM
        sync: false
      - key: VAPID_CLAIM_EMAIL
        sync: false
      - key: CORS_ORIGINS
        sync: false
